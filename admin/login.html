<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İdari Giriş | Kadınların Sesi Derneği</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-logo">
      <img src="../assets/logo.jpeg" alt="Logo">
      <h2>İdari Yönetim Paneli</h2>
    </div>
    
    <form action="dashboard.html">
      <div class="form-group">
        <label for="username">Kullanıcı Adı</label>
        <input type="text" id="username" class="form-control" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-admin">Güvenli Giriş Yap</button>
    </form>
    
    <div style="margin-top: 24px; text-align: center; font-size: 0.75rem; color: #a88a68;">
      © 2026 Kadınların Sesi Derneği <br> Bilgi İşlem Birimi
    </div>
  </div>

</body>
</html>
